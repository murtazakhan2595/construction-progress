<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Volume Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        function showLoader(stage) {
            document.getElementById(stage).classList.remove('hidden');
        }

        function hideLoader(stage) {
            document.getElementById(stage).classList.add('hidden');
        }

        function uploadImages(event) {
            event.preventDefault();
            showLoader('uploading');
            
            let formData = new FormData(event.target);
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoader('uploading');

                if (data.success) {
                    // Display detected images from YOLOv8 immediately
                    document.getElementById('beforeResult').src = data.before_result;
                    document.getElementById('afterResult').src = data.after_result;
                    document.getElementById('resultsSection').classList.remove('hidden');

                    // Start WebODM processing in the background
                    if (data.task_id) {
                        showLoader('processing');
                        checkProcessingStatus(data.task_id);
                    }
                } else {
                    alert("Error: " + data.error);
                }
            })
            .catch(error => {
                hideLoader('uploading');
                alert("Upload failed: " + error.message);
            });
        }

        function checkProcessingStatus(taskId) {
            fetch(`/check_webodm/${taskId}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === "completed") {
                    hideLoader('processing');

                    // Display the volume change result
                    document.getElementById('volumeChange').innerText = "📏 Volume Change: " + data.volume_change + " cubic meters";
                    document.getElementById('volumeSection').classList.remove('hidden');

                } else if (data.status === "failed") {
                    hideLoader('processing');
                    alert("Error: WebODM processing failed.");
                } else {
                    setTimeout(() => checkProcessingStatus(taskId), 5000);
                }
            })
            .catch(error => {
                hideLoader('processing');
                alert("Error checking WebODM status: " + error.message);
            });
        }
    </script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">
    <h2 class="text-3xl font-bold text-gray-800 mb-4 text-center">Construction Volume Analysis</h2>

    <form id="uploadForm" enctype="multipart/form-data" class="space-y-4 w-full max-w-3xl" onsubmit="uploadImages(event);">
        <div>
            <label class="block text-gray-600 font-medium">Before Image:</label>
            <input type="file" name="before_image" required class="w-full px-3 py-2 border rounded-lg shadow-sm">
        </div>
        <div>
            <label class="block text-gray-600 font-medium">After Image:</label>
            <input type="file" name="after_image" required class="w-full px-3 py-2 border rounded-lg shadow-sm">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition duration-300">
            Upload & Analyze
        </button>
    </form>

    <div id="uploading" class="hidden mt-6 text-center text-gray-700">🔄 Uploading images...</div>
    <div id="processing" class="hidden mt-6 text-center text-gray-700">⚙️ Processing images...</div>

    <div id="resultsSection" class="hidden mt-6 flex flex-col items-center w-full">
        <!-- Side-by-Side Images -->
        <div class="w-full flex justify-center gap-4">
            <!-- Before Image Section -->
            <div class="w-[20%] flex flex-col items-center">
                <h3 class="text-lg font-semibold text-gray-700 mb-2">Before Image</h3>
                <img id="beforeResult" class="w-full h-auto object-contain rounded-lg shadow-md">
            </div>

            <!-- After Image Section -->
            <div class="w-[20%] flex flex-col items-center">
                <h3 class="text-lg font-semibold text-gray-700 mb-2">After Image</h3>
                <img id="afterResult" class="w-full h-auto object-contain rounded-lg shadow-md">
            </div>
        </div>
        

        <!-- Volume Calculation Section -->
        <div id="volumeSection" class="p-6 mt-6 bg-blue-50 border border-blue-300 rounded-lg shadow-md text-center hidden">
            <h3 class="text-2xl font-bold text-gray-800">📏 Volume Calculation</h3>
            <p id="volumeChange" class="text-xl text-blue-700 font-semibold mt-2"></p>
        </div>
    </div>
</body>
</html>
