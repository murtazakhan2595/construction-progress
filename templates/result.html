<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Construction Volume Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-6">

  <div class="w-full max-w-4xl bg-white shadow-xl rounded-2xl p-8 space-y-6">
    <h1 class="text-4xl font-bold text-center text-blue-700">📐 Construction Volume Analysis</h1>

    <form id="uploadForm" enctype="multipart/form-data" class="space-y-4" onsubmit="uploadImages(event);">
      <div>
        <label class="block mb-1 font-semibold text-gray-700">Before Images:</label>
        <input type="file" name="before_images" multiple required class="block w-full border border-gray-300 rounded-lg px-4 py-2" />
      </div>
      <div>
        <label class="block mb-1 font-semibold text-gray-700">After Images:</label>
        <input type="file" name="after_images" multiple required class="block w-full border border-gray-300 rounded-lg px-4 py-2" />
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition">Upload & Analyze</button>
    </form>

    <!-- Loaders -->
    <div id="uploading" class="hidden text-center text-gray-600 animate-pulse">🔄 Uploading images...</div>
    <div id="processing" class="hidden text-center text-gray-600 animate-pulse">⚙️ Processing and calculating volume...</div>

    <!-- Result Section -->
    <div id="resultsSection" class="hidden">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-4">
        <div class="flex flex-col items-center">
          <h3 class="text-lg font-medium text-gray-700 mb-2">🖼️ Before</h3>
          <img id="beforeResult" class="w-full object-contain rounded-lg border shadow" />
        </div>
        <div class="flex flex-col items-center">
          <h3 class="text-lg font-medium text-gray-700 mb-2">🖼️ After</h3>
          <img id="afterResult" class="w-full object-contain rounded-lg border shadow" />
        </div>
      </div>

      <div id="volumeSection" class="mt-8 bg-blue-100 p-6 rounded-lg shadow text-center hidden">
        <h3 class="text-2xl font-semibold text-blue-800">📊 Volume Change Detected</h3>
        <p id="volumeChange" class="text-xl text-blue-700 font-medium mt-2"></p>
      </div>
    </div>
  </div>

  <script>
    function showLoader(stage) {
      document.getElementById(stage).classList.remove('hidden');
    }

    function hideLoader(stage) {
      document.getElementById(stage).classList.add('hidden');
    }

    function uploadImages(event) {
      event.preventDefault();
      showLoader('uploading');

      const formData = new FormData(event.target);
      fetch('/upload', {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        hideLoader('uploading');

        if (data.success) {
          document.getElementById('beforeResult').src = data.before_result;
          document.getElementById('afterResult').src = data.after_result;
          document.getElementById('resultsSection').classList.remove('hidden');

          if (data.task_id) {
            showLoader('processing');
            checkProcessingStatus(data.task_id);
          }
        } else {
          alert("❌ Error: " + data.error);
        }
      })
      .catch(err => {
        hideLoader('uploading');
        alert("❌ Upload error: " + err.message);
      });
    }

    function checkProcessingStatus(taskId) {
      fetch(`/check_webodm/${taskId}`)
        .then(res => res.json())
        .then(data => {
          if (data.status === "completed") {
            hideLoader('processing');
            document.getElementById('volumeChange').innerText = data.volume_change + " m³";
            document.getElementById('volumeSection').classList.remove('hidden');
          } else if (data.status === "failed") {
            hideLoader('processing');
            alert("❌ WebODM processing failed.");
          } else {
            setTimeout(() => checkProcessingStatus(taskId), 4000);
          }
        })
        .catch(err => {
          hideLoader('processing');
          alert("❌ Check failed: " + err.message);
        });
    }
  </script>

</body>
</html>
